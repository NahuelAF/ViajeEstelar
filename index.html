<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Viaje Espacial 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#07000f;
    overflow:hidden;
    width:100vw; height:100vh;
    font-family:'Quicksand',sans-serif;
  }

  /* ── INTRO ── */
  #intro {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:radial-gradient(ellipse at 50% 60%, #1a0030 0%, #07000f 70%);
    z-index:100;
    transition:opacity 1s ease;
  }
  #intro.out { opacity:0; pointer-events:none; }

  #intro::before {
    content:'';
    position:absolute; inset:0;
    background-image:
      radial-gradient(1px 1px at 8% 15%, #fff 0%,transparent 100%),
      radial-gradient(1.5px 1.5px at 22% 72%, #ffb3d9 0%,transparent 100%),
      radial-gradient(1px 1px at 40% 8%, #fff 0%,transparent 100%),
      radial-gradient(1px 1px at 58% 55%, #c84fff 0%,transparent 100%),
      radial-gradient(2px 2px at 78% 20%, #ff6eb4 0%,transparent 100%),
      radial-gradient(1px 1px at 91% 80%, #fff 0%,transparent 100%),
      radial-gradient(1.5px 1.5px at 66% 90%, #ffb3d9 0%,transparent 100%),
      radial-gradient(1px 1px at 12% 90%, #fff 0%,transparent 100%),
      radial-gradient(1px 1px at 34% 42%, #fff 0%,transparent 100%),
      radial-gradient(1.5px 1.5px at 83% 50%, #c84fff 0%,transparent 100%);
    animation:tw 2.5s ease-in-out infinite alternate;
  }
  @keyframes tw { from{opacity:.5} to{opacity:1} }

  .rocket-wrap {
    position:relative; z-index:2;
    cursor:pointer;
    animation:bob 2s ease-in-out infinite;
    filter:drop-shadow(0 0 18px #ff6eb4) drop-shadow(0 0 40px #c84fff);
    transition:transform .15s;
  }
  .rocket-wrap:active { transform:scale(.94); }
  @keyframes bob {
    0%,100%{ transform:translateY(0); }
    50%    { transform:translateY(-10px); }
  }

  .itxt {
    position:relative; z-index:2;
    margin-top:28px;
    font-family:'Dancing Script',cursive;
    font-size:clamp(1.2rem,4.5vw,1.9rem);
    color:#fff; text-align:center;
    text-shadow:0 0 12px #ff6eb4, 0 0 30px #c84fff;
    animation:gltxt 2s ease-in-out infinite alternate;
    padding:0 24px; line-height:1.4;
    pointer-events:none;
  }
  @keyframes gltxt {
    from{ text-shadow:0 0 10px #ff6eb4,0 0 20px #c84fff; }
    to  { text-shadow:0 0 22px #ff2d8b,0 0 45px #c84fff,0 0 65px #ff6eb4; }
  }
  .hint {
    position:relative; z-index:2;
    margin-top:12px;
    font-size:.72rem; color:rgba(255,110,180,.65);
    letter-spacing:.22em; text-transform:uppercase;
    animation:blink 1.5s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* ── CANVAS ── */
  #journey {
    position:fixed; inset:0;
    opacity:0; pointer-events:none;
    transition:opacity 1.1s ease;
  }
  #journey.on { opacity:1; pointer-events:all; }
  canvas { display:block; width:100%; height:100%; }

  /* ── FINALE ── */
  #finale {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:radial-gradient(ellipse at center, #1e0035 0%, #07000f 75%);
    z-index:200;
    opacity:0; pointer-events:none;
    transition:opacity 2s ease;
    padding:20px; overflow:hidden;
  }
  #finale.on { opacity:1; pointer-events:all; }

  .star-spin {
    animation:spin-star 8s linear infinite, pop-in .8s cubic-bezier(.17,.67,.38,1.4) forwards;
    opacity:0; margin-bottom:14px;
    filter:drop-shadow(0 0 25px gold) drop-shadow(0 0 55px #ff6eb4);
  }
  @keyframes spin-star { to{transform:rotate(360deg)} }
  @keyframes pop-in { from{opacity:0;transform:scale(.2)} to{opacity:1;transform:scale(1)} }

  .tkm {
    font-family:'Dancing Script',cursive;
    font-size:clamp(3.5rem,13vw,7.5rem);
    background:linear-gradient(135deg,#ffd700,#ff6eb4,#c84fff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 18px #ff6eb4);
    animation:pop-in 1s cubic-bezier(.17,.67,.38,1.4) .3s forwards;
    opacity:0; text-align:center;
  }
  .fphr {
    font-family:'Dancing Script',cursive;
    font-size:clamp(1rem,3.8vw,1.65rem);
    color:#ffb3d9; text-align:center;
    margin-top:10px;
    text-shadow:0 0 14px #ff6eb4;
    max-width:360px; line-height:1.55;
    animation:fup 1.5s ease .9s forwards; opacity:0;
  }
  @keyframes fup { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

  .rbtn {
    margin-top:32px; padding:11px 28px;
    background:transparent; border:1.5px solid #ff6eb4;
    color:#ff6eb4; font-family:'Quicksand',sans-serif;
    font-size:.82rem; letter-spacing:.22em; text-transform:uppercase;
    cursor:pointer; border-radius:50px; transition:all .3s;
    animation:fup 1.5s ease 1.8s forwards; opacity:0;
  }
  .rbtn:hover { background:#ff6eb4; color:#07000f; box-shadow:0 0 22px #ff6eb4; }

  .hrt {
    position:absolute; pointer-events:none;
    animation:rise linear infinite; opacity:0;
  }
  @keyframes rise {
    0%  { transform:translateY(110vh) scale(.5); opacity:0; }
    8%  { opacity:.85; }
    90% { opacity:.55; }
    100%{ transform:translateY(-15vh) scale(1.3); opacity:0; }
  }

  #shooting-stars {
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
  }

  .shooting-star {
    position:absolute;
    width:3px;
    height:3px;
    border-radius:50%;
    background:#fff;
    box-shadow:
      0 0 6px #fff,
      -10px 10px 12px rgba(255,255,255,0.4),
      -20px 20px 18px rgba(255,110,180,0.25),
      -30px 30px 24px rgba(255,110,180,0.15);
    filter:blur(0.3px);
    animation:shoot linear infinite;
  }

  @keyframes shoot {
    0% { transform:translate(0,0) scale(0.6); opacity:0; }
    5% { opacity:1; }
    100% { transform:translate(-140vw,140vh) scale(1.1); opacity:0; }
  }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="rocket-wrap" id="launchBtn">
    <svg width="115" height="115" viewBox="0 0 120 120" fill="none">
      <ellipse cx="60" cy="107" rx="9" ry="13" fill="#ff6eb4" opacity=".9">
        <animate attributeName="ry" values="13;17;11;15;13" dur=".35s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".9;.55;1;.65;.9" dur=".35s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="60" cy="109" rx="5" ry="8" fill="#ffd700" opacity=".85">
        <animate attributeName="ry" values="8;11;6;10;8" dur=".28s" repeatCount="indefinite"/>
      </ellipse>
      <path d="M60 10C45 30 40 55 40 80L80 80C80 55 75 30 60 10Z" fill="#c84fff"/>
      <path d="M60 10C52 30 50 55 50 80L60 80L60 10Z" fill="#ff6eb4" opacity=".55"/>
      <circle cx="60" cy="50" r="10" fill="#07000f" stroke="#ff6eb4" stroke-width="2.5"/>
      <circle cx="60" cy="50" r="5"  fill="#1a0030"/>
      <circle cx="57" cy="47" r="2"  fill="#ff6eb4" opacity=".75"/>
      <path d="M40 80L24 100L40 94Z" fill="#ff2d8b"/>
      <path d="M80 80L96 100L80 94Z" fill="#ff2d8b"/>
      <text x="54" y="31" font-size="8" fill="#ffd700" opacity=".9">✦</text>
    </svg>
  </div>
  <p class="itxt">Empecemos este viaje especial 🚀✨</p>
  <p class="hint">toca para despegar</p>
</div>

<!-- JOURNEY -->
<div id="journey"><canvas id="c"></canvas></div>

<!-- FINALE -->
<div id="finale">
  <div id="shooting-stars"></div>
  <div id="hrtBox"></div>
  <canvas id="constellationCanvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;"></canvas>
  <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;">
    <div class="tkm">TKM 💕</div>
    <p class="fphr">En todo el universo no hay nadie como vos.<br>Sos mi estrella favorita 🌟</p>
    <button class="rbtn" onclick="restart()">Volar de nuevo 🚀</button>
  </div>
</div>

<script>
/* ── CONSTELACIÓN RANDOM EN FINALE ── */
let constellationAnim = null;

function drawRandomConstellation(canvasEl){
  if(constellationAnim) cancelAnimationFrame(constellationAnim);
  const ctx2 = canvasEl.getContext('2d');
  const W2 = canvasEl.width = canvasEl.offsetWidth || window.innerWidth;
  const H2 = canvasEl.height = canvasEl.offsetHeight || window.innerHeight;

  // Generar puntos random (16-20) distribuidos por toda la pantalla
  const numStars = 16 + Math.floor(Math.random()*5); // 16 a 20
  const pad = Math.min(W2,H2)*0.08;
  const pts = [];
  for(let i=0;i<numStars;i++){
    pts.push({
      x: pad + Math.random()*(W2-pad*2),
      y: pad + Math.random()*(H2-pad*2),
      r: Math.random()*2.5 + 1.8,
      phase: Math.random()*Math.PI*2,
      big: Math.random() < 0.25  // 25% son estrellas grandes con destello
    });
  }

  // Generar líneas con un recorrido tipo constelación (MST aproximado)
  // Conecta cada punto al vecino más cercano no conectado aún, formando un camino
  const lines = [];
  const connected = new Set([0]);
  while(connected.size < pts.length){
    let bestDist = Infinity, bestA = -1, bestB = -1;
    for(const a of connected){
      for(let b=0;b<pts.length;b++){
        if(connected.has(b)) continue;
        const dx=pts[a].x-pts[b].x, dy=pts[a].y-pts[b].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<bestDist){ bestDist=d; bestA=a; bestB=b; }
      }
    }
    if(bestB===-1) break;
    lines.push([bestA,bestB]);
    connected.add(bestB);
  }
  // Añadir unas pocas líneas extra para darle más forma
  const extraLines = 3 + Math.floor(Math.random()*4);
  for(let e=0;e<extraLines;e++){
    const a = Math.floor(Math.random()*pts.length);
    const b = Math.floor(Math.random()*pts.length);
    if(a!==b) lines.push([a,b]);
  }

  let frame = 0;
  function tick(){
    ctx2.clearRect(0,0,W2,H2);
    frame += 0.2;
    const starProgress = Math.min(1, frame/60);
    const lineProgress = Math.max(0, Math.min(1,(frame-20)/140));
    const t2 = performance.now()*0.001;

    // Líneas progresivas
    const linesToDraw = Math.floor(lineProgress * lines.length);
    for(let i=0;i<linesToDraw;i++){
      const [a,b] = lines[i];
      const pa=pts[a], pb=pts[b];
      const alpha = i < linesToDraw-1 ? 0.32 : 0.32*((lineProgress*lines.length)%1||1);
      ctx2.beginPath();
      ctx2.moveTo(pa.x,pa.y);
      if(i===linesToDraw-1 && lineProgress<1){
        const frac=(lineProgress*lines.length)%1;
        ctx2.lineTo(pa.x+(pb.x-pa.x)*frac, pa.y+(pb.y-pa.y)*frac);
      } else {
        ctx2.lineTo(pb.x,pb.y);
      }
      ctx2.strokeStyle=`rgba(200,215,255,${alpha})`;
      ctx2.lineWidth=0.9;
      ctx2.stroke();
    }

    // Estrellas con pulso
    for(let i=0;i<pts.length;i++){
      const p=pts[i];
      const pulse = 1 + Math.sin(t2*1.6 + p.phase)*0.2;
      const r = p.r * pulse * starProgress;

      // Halo
      const hg = ctx2.createRadialGradient(p.x,p.y,0,p.x,p.y,r*5);
      hg.addColorStop(0,`rgba(180,205,255,${0.20*starProgress})`);
      hg.addColorStop(1,'rgba(100,140,255,0)');
      ctx2.beginPath();
      ctx2.arc(p.x,p.y,r*5,0,Math.PI*2);
      ctx2.fillStyle=hg;
      ctx2.fill();

      // Cuerpo
      const sg = ctx2.createRadialGradient(p.x-r*0.3,p.y-r*0.3,0,p.x,p.y,r);
      sg.addColorStop(0,'rgba(255,255,255,1)');
      sg.addColorStop(0.4,'rgba(210,225,255,0.9)');
      sg.addColorStop(1,'rgba(130,165,255,0.55)');
      ctx2.beginPath();
      ctx2.arc(p.x,p.y,r,0,Math.PI*2);
      ctx2.fillStyle=sg;
      ctx2.fill();

      // Cruz en estrellas grandes
      if(p.big){
        const cross = r*4*starProgress;
        ctx2.save();
        ctx2.globalAlpha=0.38*starProgress;
        for(let ang=0;ang<2;ang++){
          const a2=ang*Math.PI/2;
          const cg=ctx2.createLinearGradient(
            p.x+Math.cos(a2)*cross,p.y+Math.sin(a2)*cross,
            p.x-Math.cos(a2)*cross,p.y-Math.sin(a2)*cross);
          cg.addColorStop(0,'rgba(255,255,255,0)');
          cg.addColorStop(0.5,'rgba(255,255,255,0.8)');
          cg.addColorStop(1,'rgba(255,255,255,0)');
          ctx2.beginPath();
          ctx2.moveTo(p.x+Math.cos(a2)*cross,p.y+Math.sin(a2)*cross);
          ctx2.lineTo(p.x-Math.cos(a2)*cross,p.y-Math.sin(a2)*cross);
          ctx2.strokeStyle=cg;
          ctx2.lineWidth=1.5;
          ctx2.stroke();
        }
        ctx2.restore();
      }
    }

    constellationAnim = requestAnimationFrame(tick);
  }
  tick();
}

const intro   = document.getElementById('intro');
const journey = document.getElementById('journey');
const finale  = document.getElementById('finale');
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');

const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768;

let W, H, CX, CY;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.width  = window.innerWidth * dpr;
  H = canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  CX = window.innerWidth / 2;
  CY = window.innerHeight / 2;
}
resize();
window.addEventListener('resize', resize);

/* ── INPUT: sin blur al mover, sin efecto de desplazamiento ── */
// mx y my siempre en 0 — sin parallax que borre las palabras
let mx = 0, my = 0;
// Quitamos los listeners de mousemove y touchmove que causaban el blur

/* ── COLORES RANDOM POR PALABRA (no fluorescente rosa) ── */
const WORD_COLORS = [
  '#ffd700',   // dorado
  '#00e5ff',   // cyan
  '#b388ff',   // lila suave
  '#69ff47',   // verde lima
  '#ff9a3c',   // naranja
  '#e040fb',   // violeta
  '#40c4ff',   // azul claro
  '#f48fb1',   // rosa suave (no fluorescente)
  '#a5f3a5',   // verde menta
  '#ffcc02',   // amarillo
  '#ff6b6b',   // rojo suave
  '#4fc3f7',   // celeste
  '#ce93d8',   // lavanda
  '#80cbc4',   // turquesa
  '#ffab91',   // salmon
];

/* ── FRASES ── */
const PHRASES = [
  '💖 Mi universo','✨ Te quiero','🌟 Mi todo','💕 Corazón','🌙 Mi cielo',
  '💫 Para siempre','🦋 Mi persona favorita','🌸 Te adoro','💝 Mi estrella',
  '🌺 Mi destino','💗 Solo vos','✦ Mi vida','🌈 Mi amor','💞 Por siempre'
];

/* ── CONFIG ── */
const DEPTH = 900;
const DURATION = 30000;

let startTime = 0;

/* ── OBJETOS ── */
function mkStar() {
  return {
    x:(Math.random()-.5)*W*2,
    y:(Math.random()-.5)*H*2,
    z:Math.random()*DEPTH,
    r:Math.random()*1.5+.4,
    speed: Math.random()*1 + 0.5
  };
}

function mkPhrase(z) {
  // En móvil distribuimos en área más pequeña para que quepan bien
  const spread = isMobile ? 280 : 500;
  return {
    phrase: PHRASES[Math.floor(Math.random()*PHRASES.length)],
    // FIX: empieza desde el centro (0,0) con pequeña dispersión
    // así parecen salir de la estrella central
    x: (Math.random()-.5) * spread,
    y: (Math.random()-.5) * spread,
    z: z || DEPTH,
    spd: Math.random()*2+2,
    size: isMobile ? (Math.random()*5+11) : (Math.random()*8+16),
    opacity: Math.random()*0.5 + 0.5,
    color: WORD_COLORS[Math.floor(Math.random()*WORD_COLORS.length)]
  };
}

let stars=[], phrases=[], running=false, ended=false;

/* ── INIT ── */
function initJourney(){
  const starCount = isMobile ? 180 : 260;
  const phraseCount = isMobile ? 18 : 22;
  stars = Array.from({length: starCount}, mkStar);
  phrases = Array.from({length: phraseCount}, ()=>mkPhrase());
  startTime = performance.now();
  ended = false;
  running = true;
  requestAnimationFrame(loop);
}

/* ── PROYECCIÓN ── */
function proj(x, y, z){
  const scale = DEPTH / Math.max(z,1);
  return {
    // mx/my = 0 siempre → sin desplazamiento → sin blur
    sx: CX + x * scale,
    sy: CY + y * scale,
    scale
  };
}

/* ── LOOP ── */
function loop(now){
  if(!running) return;
  requestAnimationFrame(loop);

  const elapsed = now - startTime;
  const progress = elapsed / DURATION;

  // FIX MÓVIL: arranca rápido desde el inicio, sin rampa lenta
  let spd;
  if(isMobile){
    // En móvil: arranca a velocidad completa de inmediato
    if(progress < .75) spd = 20;
    else if(progress < .9) spd = 20*(1-(progress-.75)/.15);
    else spd = 1;
  } else {
    if(progress < .1) spd = progress*25;
    else if(progress < .75) spd = 20;
    else if(progress < .9) spd = 20*(1-(progress-.75)/.15);
    else spd = 1;
  }

  ctx.fillStyle="rgba(7,0,15,0.25)";
  ctx.fillRect(0,0,window.innerWidth,window.innerHeight);

  /* ⭐ ESTRELLAS */
  for(const s of stars){
    s.z -= spd * s.speed;
    if(s.z<=1){ Object.assign(s,mkStar()); s.z=DEPTH; }

    const {sx,sy,scale} = proj(s.x,s.y,s.z);
    const r = Math.min(s.r*scale, 2.5);

    ctx.beginPath();
    ctx.arc(sx,sy,r,0,Math.PI*2);
    ctx.fillStyle="#fff";
    ctx.globalAlpha = Math.min(scale*.7,1);
    ctx.fill();

    if(Math.random() < 0.02){
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.lineTo(sx - 10*scale, sy - 10*scale);
      ctx.strokeStyle="rgba(255,255,255,0.4)";
      ctx.lineWidth=1;
      ctx.stroke();
    }
  }
  ctx.globalAlpha=1;

  /* 💕 FRASES — salen del centro (de la estrella) hacia afuera */
  for(const o of phrases){
    o.z -= o.spd * spd * .07;

    const pull = Math.max(0, (progress - 0.65)) * 0.1;
    o.x += (0 - o.x) * pull;
    o.y += (0 - o.y) * pull;

    if(o.z<=5) Object.assign(o, mkPhrase(DEPTH));

    const {sx,sy,scale} = proj(o.x,o.y,o.z);

    const maxScale = isMobile ? 1.8 : 2.2;
    const fs = o.size * Math.min(scale, maxScale);
    if(fs < 8) continue;

    // FIX: sin shadowBlur → sin blur al mover
    ctx.globalAlpha = Math.min(1, scale * o.opacity);
    ctx.font = `${fs}px "Dancing Script",cursive`;
    ctx.fillStyle = o.color;   // ← color random, no siempre rosa

    // Sin ctx.shadowBlur para evitar el efecto borroso
    ctx.fillText(o.phrase, sx - ctx.measureText(o.phrase).width/2, sy);
  }
  ctx.globalAlpha=1;

  /* 🌟 ESTRELLA CENTRAL REALISTA */
  const cx = CX;
  const cy = CY;
  const size = 18 + Math.pow(progress,3)*220;
  const t_now = performance.now()*0.001;

  // Rayos de luz (corona)
  const numRays = 14;
  for(let i=0;i<numRays;i++){
    const angle = (i/numRays)*Math.PI*2 + t_now*0.25;
    const len = (i%3===0 ? size*2.8 : i%3===1 ? size*2.0 : size*1.5)
                + Math.sin(t_now*2.2+i)*size*0.1;
    const rg = ctx.createLinearGradient(cx,cy,
      cx+Math.cos(angle)*len, cy+Math.sin(angle)*len);
    rg.addColorStop(0,`rgba(255,255,200,${0.45+Math.sin(t_now+i)*0.1})`);
    rg.addColorStop(1,'rgba(255,200,60,0)');
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(angle)*len, cy+Math.sin(angle)*len);
    ctx.strokeStyle=rg;
    ctx.lineWidth = i%3===0 ? 2 : 1;
    ctx.stroke();
  }

  // Halo exterior difuso
  const halo = ctx.createRadialGradient(cx,cy,size*0.4,cx,cy,size*2.6);
  halo.addColorStop(0,`rgba(255,240,120,0.20)`);
  halo.addColorStop(0.5,'rgba(255,160,40,0.08)');
  halo.addColorStop(1,'rgba(255,80,20,0)');
  ctx.beginPath();
  ctx.arc(cx,cy,size*2.6,0,Math.PI*2);
  ctx.fillStyle=halo;
  ctx.fill();

  // Cuerpo de la estrella — esfera realista
  const body = ctx.createRadialGradient(cx-size*0.30,cy-size*0.30,size*0.04, cx,cy,size);
  body.addColorStop(0,'#ffffff');
  body.addColorStop(0.10,'#fffde0');
  body.addColorStop(0.30,'#ffe566');
  body.addColorStop(0.58,'#ffaa20');
  body.addColorStop(0.82,'#e05500');
  body.addColorStop(1,'#7a1200');
  ctx.beginPath();
  ctx.arc(cx,cy,size,0,Math.PI*2);
  ctx.fillStyle=body;
  ctx.fill();

  // Reflejo especular
  const spec = ctx.createRadialGradient(cx-size*0.28,cy-size*0.30,0,
               cx-size*0.28,cy-size*0.28,size*0.40);
  spec.addColorStop(0,'rgba(255,255,255,0.88)');
  spec.addColorStop(0.5,'rgba(255,255,255,0.20)');
  spec.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(cx-size*0.28,cy-size*0.28,size*0.40,0,Math.PI*2);
  ctx.fillStyle=spec;
  ctx.fill();

  // Limbo oscuro (borde)
  const limb = ctx.createRadialGradient(cx,cy,size*0.70,cx,cy,size);
  limb.addColorStop(0,'rgba(0,0,0,0)');
  limb.addColorStop(1,'rgba(0,0,0,0.38)');
  ctx.beginPath();
  ctx.arc(cx,cy,size,0,Math.PI*2);
  ctx.fillStyle=limb;
  ctx.fill();

  /* IMPACTO */
  if(progress>=0.97 && !ended){
    ended=true;
    running=false;
    doFlash();
  }
}

/* FLASH */
function doFlash(){
  let f=0;
  const iv=setInterval(()=>{
    f++;
    ctx.fillStyle=`rgba(255,255,255,${f*.1})`;
    ctx.fillRect(0,0,window.innerWidth,window.innerHeight);
    if(f>10){clearInterval(iv);showFinale();}
  },30);
}

function showFinale(){
  finale.classList.add('on');

  const container = document.getElementById('shooting-stars');
  container.innerHTML = '';

  for(let i=0;i<45;i++){
    const star = document.createElement('div');
    star.className = 'shooting-star';
    const size = Math.random()*3+1;
    star.style.left = Math.random()*100 + 'vw';
    star.style.top  = Math.random()*60 + 'vh';
    star.style.width = size+'px';
    star.style.height = size+'px';
    const colors = ['#fff','#ffd700','#ff6eb4'];
    star.style.background = colors[Math.floor(Math.random()*colors.length)];
    star.style.animationDuration = (Math.random()*2+1.5)+'s';
    star.style.animationDelay = (Math.random()*6)+'s';
    container.appendChild(star);
  }

  // Iniciar constelación Géminis
  const constellCanvas = document.getElementById('constellationCanvas');
  setTimeout(()=> drawRandomConstellation(constellCanvas), 400);
}

/* CONTROLES */
function launch(){
  intro.classList.add('out');

  audio.currentTime = 0;
  audio.muted = false;
  audio.play().catch(()=>{});

  setTimeout(()=>{
    intro.style.display='none';
    journey.classList.add('on');
    initJourney();
  },800);
}

function restart(){
  finale.classList.remove('on');
  running=false;
  if(constellationAnim){ cancelAnimationFrame(constellationAnim); constellationAnim=null; }
  ctx.clearRect(0,0,canvas.width,canvas.height);

  setTimeout(()=>{
    journey.classList.remove('on');
    intro.style.display='flex';
    intro.classList.remove('out');
  },400);
}

/* 🎵 AUDIO */
const audio = new Audio('img/music.webm');
audio.volume = 0.1;
audio.loop = true;

document.getElementById('launchBtn').addEventListener('click', launch);
document.getElementById('launchBtn').addEventListener('touchend', e=>{ e.preventDefault(); launch(); });
</script>
