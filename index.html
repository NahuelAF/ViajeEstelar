<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Un viaje espacial romántico lleno de amor y estrellas. Una experiencia interactiva especial para vos.">
  <meta name="theme-color" content="#07000f">
  <meta property="og:title" content="Viaje Espacial 💕">
  <meta property="og:description" content="Empecemos este viaje especial juntos ✨">
  <meta property="og:type" content="website">
  <title>Viaje Espacial 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- INTRO -->
  <div id="intro">
    <div class="rocket-wrap" id="launchBtn" role="button" aria-label="Iniciar viaje espacial">
      <svg width="115" height="115" viewBox="0 0 120 120" fill="none" aria-hidden="true">
        <ellipse cx="60" cy="107" rx="9" ry="13" fill="#ff6eb4" opacity=".9">
          <animate attributeName="ry" values="13;17;11;15;13" dur=".35s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".9;.55;1;.65;.9" dur=".35s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="60" cy="109" rx="5" ry="8" fill="#ffd700" opacity=".85">
          <animate attributeName="ry" values="8;11;6;10;8" dur=".28s" repeatCount="indefinite"/>
        </ellipse>
        <path d="M60 10C45 30 40 55 40 80L80 80C80 55 75 30 60 10Z" fill="#c84fff"/>
        <path d="M60 10C52 30 50 55 50 80L60 80L60 10Z" fill="#ff6eb4" opacity=".55"/>
        <circle cx="60" cy="50" r="10" fill="#07000f" stroke="#ff6eb4" stroke-width="2.5"/>
        <circle cx="60" cy="50" r="5" fill="#1a0030"/>
        <circle cx="57" cy="47" r="2" fill="#ff6eb4" opacity=".75"/>
        <path d="M40 80L24 100L40 94Z" fill="#ff2d8b"/>
        <path d="M80 80L96 100L80 94Z" fill="#ff2d8b"/>
        <text x="54" y="31" font-size="8" fill="#ffd700" opacity=".9">✦</text>
      </svg>
    </div>
    <p class="itxt">Empecemos este viaje LULU 🚀✨</p>
    <p class="hint">toca para despegar</p>
  </div>

  <!-- JOURNEY -->
  <div id="journey">
    <canvas id="c" aria-hidden="true"></canvas>
  </div>

  <!-- FINALE -->
  <div id="finale" role="main">
    <div id="shooting-stars" aria-hidden="true"></div>
    <div id="hrtBox" aria-hidden="true"></div>
    <canvas id="constellationCanvas" aria-hidden="true"></canvas>
    <div class="finale-content">
      <div class="tkm">TKM 💕</div>
      <p class="fphr">En todo el universo no hay nadie como vos.<br>Sos mi estrella favorita 🌟</p>
      <button class="rbtn" onclick="restart()">Volar de nuevo 🚀</button>
    </div>
  </div>

  <script src="js/main.js" defer></script>
</body>
</html>
